url: https://ropenspain.github.io/CatastRo/

development:
  mode: auto

repo:
  branch: main

template:
  bootstrap: 5
  package: rostemplate

figures:
  dpi: 300
  fig.retina: 2

home:
  title: CatastRo
  description: >
    Access public spatial data from the Spanish Cadastre through INSPIRE and
    OVC services.

authors:
  Ángel Delgado Panadero:
    href: https://github.com/DelgadoPanadero
  Diego Hernangómez:
    href: "https://dieghernan.github.io/"
  Iñaki Ucar:
    href: "https://www.enchufa2.es/"

reference:
- title: INSPIRE services
  desc: >
    Retrieve cadastral addresses, buildings, parcels and georeferenced map
    images through Spanish Cadastre INSPIRE services.
- subtitle: ATOM downloads
  desc: >
    Download complete municipal cadastral datasets and query their metadata.
- contents:
  - has_concept("atom")
- subtitle: WFS queries
  desc: >
    Retrieve cadastral features for a selected bounding box or cadastral
    identifier.
- contents:
  - has_concept("wfs")
  - -has_keyword("datasets")
- subtitle: WMS maps
  desc: >
    Download georeferenced cadastral map images.
- contents:
  - has_concept("wms")

- title: OVC services
  desc: >
    Geocode cadastral references, reverse geocode coordinates and query
    administrative codes through Spanish Cadastre OVC services.
- subtitle: Coordinates and cadastral references
  desc: >
    Convert between cadastral references and spatial coordinates.
- contents:
  - has_concept("ovc_coordinates")
  - -has_keyword("datasets")
- subtitle: Province and municipality codes
  desc: >
    Query province and municipality codes used by the Spanish Cadastre.
- contents:
  - has_concept("ovc_street_directory")

- title: Utilities and reference data
  desc: >
    Search Spanish Cadastre identifiers, manage downloaded files and inspect
    package reference data.
- subtitle: Search
  desc: >
    Find cadastral municipality codes and related reference information.
- contents:
  - has_concept("search")
- subtitle: Cache management
  desc: >
    Configure, detect and clear the local cache used by **CatastRo**.
- contents:
  - has_concept("cache_utilities")
- subtitle: Datasets
  desc: >
    Inspect SRS reference data used by the package services.
- contents:
  - has_keyword("datasets")

- title: Helpers and package metadata
  desc: >
    Read package-level documentation.
- contents:
  - CatastRo-package

articles:
- title: Service guides
  navbar: ~
  contents:
  - ovcservice
